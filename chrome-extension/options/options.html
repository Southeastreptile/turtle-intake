<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SERC Intake — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #faf8f4;
      color: #3b2a1a;
      padding: 32px;
      min-width: 420px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #5c3d1e;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #5c3d1e;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="url"],
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #c8aa88;
      border-radius: 6px;
      font-size: 14px;
      background: #fff;
      color: #3b2a1a;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus {
      border-color: #5c3d1e;
    }

    .hint {
      font-size: 12px;
      color: #8c6b44;
      margin-top: 5px;
    }

    button {
      background: #5c3d1e;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #3b2a1a; }

    #status {
      margin-top: 14px;
      font-size: 13px;
      color: #4a7c3f;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h1>⚙ SERC Intake Settings</h1>

  <div class="field">
    <label for="backendUrl">Backend URL</label>
    <input
      type="url"
      id="backendUrl"
      placeholder="https://serc-intake-api-4d3j3nugya-uk.a.run.app"
    />
    <p class="hint">Change to http://localhost:8000 for local development.</p>
  </div>

  <button id="save">Save</button>
  <p id="status"></p>

  <script src="options.js"></script>
</body>
</html>
